name: Update MARMOO menu XML feed

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/update-menu-feed.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/update-menu-feed.yml"
  schedule:
    # GitHub cron uses UTC. Run at both possible UTC offsets and continue
    # only when the local time in Europe/Kyiv is 12:00.
    - cron: "0 9,10 * * *"

permissions:
  contents: write

concurrency:
  group: marmoo-menu-feed
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check Kyiv schedule
        id: kyiv-time
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$(TZ=Europe/Kyiv date +%H)" == "12" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.kyiv-time.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.kyiv-time.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.kyiv-time.outputs.run == 'true'
        run: npm install --legacy-peer-deps

      - name: Install Chromium
        if: steps.kyiv-time.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Generate live XML feed
        if: steps.kyiv-time.outputs.run == 'true'
        env:
          MARMOO_MENU_URL: https://marmooolymp.choiceqr.com/online-menu
          MARMOO_FEED_PATH: public/feed/marmoo-menu.xml
          MARMOO_FEED_STATUS_PATH: public/feed/status.json
        run: npm run update:menu-feed

      - name: Validate XML and minimum item count
        if: steps.kyiv-time.outputs.run == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          tree = ET.parse('public/feed/marmoo-menu.xml')
          items = tree.findall('.//item')
          status = json.load(open('public/feed/status.json', encoding='utf-8'))
          if len(items) < 10:
              raise SystemExit(f'Safety stop: only {len(items)} items')
          if status.get('total_items') != len(items):
              raise SystemExit('XML/status item count mismatch')
          print(f'Validated {len(items)} menu items')
          PY

      - name: Commit refreshed feed
        if: steps.kyiv-time.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name "MARMOO Feed Bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/feed/marmoo-menu.xml public/feed/status.json package-lock.json
          if git diff --cached --quiet; then
            echo "Feed has no changes"
          else
            git commit -m "chore(feed): refresh MARMOO menu"
            git push
          fi
