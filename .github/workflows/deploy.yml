name: Deploy Marmoo Form to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Project
        run: |
          # Автоматично шукаємо папку, де лежить package.json (ігноруючи node_modules)
          APP_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$APP_DIR"
          
          echo "Успішно зайшли в папку проєкту: $APP_DIR"
          
          # Встановлюємо залежності
          npm install --legacy-peer-deps
          
          # Запуск збірки Vite
          VITE_API_URL="${{ secrets.VITE_API_URL }}" npm run build
          
          # Переносимо результат у корінь, звідки GitHub Pages забирає артефакти
          mkdir -p ../dist_root
          cp -r dist/* ../dist_root/ || cp -r dist ../dist_root

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist_root'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
