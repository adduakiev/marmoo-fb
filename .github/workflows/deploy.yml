name: Deploy MARMOO BI to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Refresh dashboard data every 30 minutes.
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MARMOO_DATA_URL: https://script.google.com/macros/s/AKfycbzglLMWDMZRc1NAzWi_Lluo1O69XAVURkNf8mWn_c6XRzlkvzXQkL8nCoumMG6Z_dAB/exec

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fetch General and Dishes snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public

          curl --fail --location --silent --show-error \
            --retry 3 --retry-delay 5 \
            "$MARMOO_DATA_URL" \
            --output public/data.json

          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('public/data.json', 'utf8').trim();

          if (raw.startsWith('<!DOCTYPE') || raw.startsWith('<html')) {
            throw new Error('Apps Script returned HTML instead of JSON. Check the deployed /exec URL and doGet().');
          }

          const payload = JSON.parse(raw);
          if (!Array.isArray(payload.general) || !Array.isArray(payload.dishes)) {
            throw new Error('Invalid BI payload: expected general[] and dishes[].');
          }

          console.log(`Loaded ${payload.general.length} General rows and ${payload.dishes.length} Dishes rows`);
          NODE

      - name: Build Project
        run: npm run build
        env:
          # Browser reads same-origin JSON from GitHub Pages, avoiding Apps Script CORS.
          VITE_API_URL: /marmoo-fb/data.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
