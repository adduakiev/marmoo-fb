name: Deploy Marmoo Form to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Project
        run: |
          # Переходимо безпосередньо у фіксовану папку проєкту
          cd adduakiev-marmoo-fb-ae4f83fa0cd2b1898fa2502d307a3252d112f271
          
          echo "Запуск збірки в папці додатка..."
          
          # Надійне встановлення залежностей
          npm install --legacy-peer-deps
          
          # Запуск збірки з передачею секрету
          VITE_API_URL="${{ secrets.VITE_API_URL }}" npm run build
          
          # Копіюємо результат у корінь репозиторію
          cp -r dist ../dist_root

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist_root'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
