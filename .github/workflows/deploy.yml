name: Deploy MARMOO BI to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Refresh dashboard data every 30 minutes.
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fetch General and Dishes snapshot
        shell: bash
        run: |
          mkdir -p public
          curl --fail --location --retry 3 --retry-delay 5 \
            "https://script.google.com/macros/s/AKfycbwAQxi7IhIxOjo7AJTzS53vJVjh5UHeNNbGFPmYt0i-bePY2YQBZvZ6jaYBbpRLqu3E/exec" \
            --output public/data.json
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('public/data.json','utf8')); if(!Array.isArray(j.general)||!Array.isArray(j.dishes)) throw new Error('Invalid BI payload'); console.log('Loaded',j.general.length,'General rows and',j.dishes.length,'Dishes rows');"

      - name: Build Project
        run: npm run build
        env:
          # Browser reads same-origin JSON from GitHub Pages, avoiding Apps Script CORS.
          VITE_API_URL: /marmoo-fb/data.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
