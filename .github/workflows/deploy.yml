name: Deploy Marmoo Form to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Project
        run: |
          # Знаходимо папку, де лежить package.json
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$TARGET_DIR"
          
          echo "Збірка проєкту в директорії: $TARGET_DIR"
          
          # Встановлюємо чисті залежності
          npm install
          
          # Компілюємо проєкт за допомогою Vite
          VITE_API_URL="${{ secrets.VITE_API_URL }}" npm run build
          
          # Переносимо готову папку dist так, щоб робот деплою її точно побачив
          mv dist ../../dist_root 2>/dev/null || cp -r dist ../dist_root || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist_root'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
