name: Deploy Marmoo Form to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Locate project directory and build
        run: |
          # Автоматично знаходимо, де лежить package.json (в корені чи в підпапці)
          SUBDIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$SUBDIR"
          
          echo "Робоча директорія проєкту: $SUBDIR"
          
          # Встановлюємо залежності (створюючи lock-file автоматично)
          npm install
          
          # Запускаємо збірку з передачею секретного токена
          VITE_API_URL="${{ secrets.VITE_API_URL }}" npm run build
          
          # Переміщуємо результат збірки в корінь для завантаження артефакту
          cp -r dist ../../dist_root 2>/dev/null || cp -r dist ../dist_root

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist_root'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
